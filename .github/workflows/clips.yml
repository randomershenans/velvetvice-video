name: Daily Velvet clips

on:
  schedule:
    # Five runs a day spaced across EU/US prime social hours (UTC).
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 20 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: How many clips to generate
        required: false
        default: '1'

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Install ffmpeg
        # Used by pipeline.mjs to time-stretch the TTS audio (atempo filter).
        # Not on ubuntu-latest by default since 2024.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Generate, render, and post clip
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          CLIP_COUNT: ${{ inputs.count || '1' }}
          TTS_RATE: ${{ vars.TTS_RATE || '0.7' }}
        run: npm run pipeline

      - name: Upload artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clips-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.png
            output/*.txt
          retention-days: 7
          if-no-files-found: ignore
