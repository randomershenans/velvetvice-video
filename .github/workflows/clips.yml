name: Daily VelvetVice clips

on:
  schedule:
    # Once a day — generates 5 clips and schedules them across the day on Ayrshare.
    # Adjust posting cadence with POST_START_HOURS / POST_INTERVAL_HOURS.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: How many clips to generate
        required: false
        default: '5'

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Generate, render, and schedule clips
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          CLIP_COUNT: ${{ inputs.count || '5' }}
        run: npm run pipeline

      - name: Upload artifacts (fallback if Ayrshare upload fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clips-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.png
            output/*.txt
          retention-days: 7
          if-no-files-found: ignore
